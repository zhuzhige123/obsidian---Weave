name: Quality Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  quality-gate:
    name: Quality Gate Enforcement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史用于分析
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      # 关键质量指标检查
      - name: "Gate 1: TypeScript errors must be zero"
        id: ts-errors
        run: |
          echo "🔍 Checking TypeScript errors..."
          npm run check 2>&1 | tee type-check.log
          ERRORS=$(grep -c "Error:" type-check.log || true)
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "TypeScript errors found: $ERRORS"
          
          # 目标：0个错误（当前基线28个，暂时允许）
          if [ $ERRORS -gt 28 ]; then
            echo "❌ FAILED: TypeScript errors increased from baseline (28)"
            echo "Current: $ERRORS errors"
            echo "Baseline: 28 errors"
            exit 1
          elif [ $ERRORS -lt 28 ]; then
            echo "✅ IMPROVED: TypeScript errors reduced!"
            echo "Previous: 28 errors"
            echo "Current: $ERRORS errors"
          else
            echo "✅ PASSED: TypeScript errors at baseline (28)"
          fi
      
      - name: "Gate 2: Test coverage threshold"
        id: coverage
        run: |
          echo "🔍 Checking test coverage..."
          npm run test -- --coverage --reporter=json > test-results.json || true
          
          # 提取覆盖率（如果有的话）
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(jq '.total.lines.pct' coverage/coverage-summary.json)
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            echo "Line coverage: $COVERAGE%"
            
            # 目标：≥70%（逐步提升）
            if (( $(echo "$COVERAGE < 60" | bc -l) )); then
              echo "❌ FAILED: Coverage below minimum threshold (60%)"
              exit 1
            elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then
              echo "✅ EXCELLENT: Coverage ≥ 70%"
            else
              echo "⚠️ WARNING: Coverage below target (70%) but above minimum (60%)"
            fi
          else
            echo "⚠️ Coverage data not available"
          fi
      
      - name: "Gate 3: No console.log in production code"
        run: |
          echo "🔍 Checking for console.log..."
          COUNT=$(grep -r "console\.log" src \
            --exclude-dir=tests \
            --exclude-dir=__tests__ \
            --exclude="*.test.ts" \
            --exclude="*.test.js" \
            --include="*.ts" \
            --include="*.js" \
            --include="*.svelte" | wc -l || echo 0)
          
          echo "console.log occurrences: $COUNT"
          
          if [ $COUNT -gt 20 ]; then
            echo "⚠️ WARNING: Too many console.log statements ($COUNT)"
            echo "Consider using proper logging utilities"
          else
            echo "✅ PASSED: console.log usage acceptable"
          fi
      
      - name: "Gate 4: Critical TODOs check"
        run: |
          echo "🔍 Checking for critical TODOs..."
          CRITICAL=$(grep -r "TODO.*FIXME\|TODO.*BLOCKER\|FIXME\|XXX" src \
            --include="*.ts" \
            --include="*.svelte" | wc -l || echo 0)
          
          echo "Critical TODOs/FIXMEs found: $CRITICAL"
          
          if [ $CRITICAL -gt 0 ]; then
            echo "⚠️ WARNING: $CRITICAL critical TODOs found"
            grep -rn "TODO.*FIXME\|TODO.*BLOCKER\|FIXME\|XXX" src \
              --include="*.ts" \
              --include="*.svelte" || true
          else
            echo "✅ PASSED: No critical TODOs"
          fi
      
      - name: "Gate 5: Build size check"
        run: |
          echo "🔍 Building and checking size..."
          npm run build
          
          if [ -f "dist/main.js" ]; then
            SIZE=$(stat -c%s "dist/main.js" 2>/dev/null || stat -f%z "dist/main.js" 2>/dev/null)
            SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
            echo "Build size: ${SIZE_MB}MB"
            
            if [ $SIZE -gt 10000000 ]; then
              echo "❌ FAILED: Build size exceeds 10MB"
              exit 1
            else
              echo "✅ PASSED: Build size OK (${SIZE_MB}MB)"
            fi
          else
            echo "❌ FAILED: Build output not found"
            exit 1
          fi
      
      # 生成质量报告
      - name: Generate Quality Report
        if: always()
        run: |
          cat > quality-report.md << 'EOF'
          # 🎯 Quality Gate Report
          
          ## Metrics Summary
          
          | Metric | Status | Value | Threshold |
          |--------|--------|-------|-----------|
          | TypeScript Errors | ${{ steps.ts-errors.outputs.errors <= 28 && '✅' || '❌' }} | ${{ steps.ts-errors.outputs.errors }} | ≤ 28 (baseline) |
          | Test Coverage | ${{ steps.coverage.outputs.coverage >= 60 && '✅' || '⚠️' }} | ${{ steps.coverage.outputs.coverage }}% | ≥ 60% |
          | Build Size | ✅ | - | < 10MB |
          
          ## Gate Results
          
          - ✅ **TypeScript Errors**: At or below baseline
          - ${{ steps.coverage.outputs.coverage >= 60 && '✅' || '⚠️' }} **Test Coverage**: ${{ steps.coverage.outputs.coverage }}%
          - ✅ **console.log**: Acceptable usage
          - ✅ **Build Size**: Within limits
          
          ---
          *Generated by Quality Gate CI*
          EOF
          
          cat quality-report.md
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('quality-report.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
